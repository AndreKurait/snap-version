name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build distribution + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - id: vars
        run: |
          TAG="${GITHUB_REF##refs/tags/}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: ./gradlew --no-daemon test

      - run: ./gradlew --no-daemon distZip distTar fatJar -Pversion=${{ steps.vars.outputs.version }}

      - name: Stage distributables
        run: |
          mkdir -p dist
          cp build/distributions/snap-version-*.zip dist/
          cp build/distributions/snap-version-*.tar dist/
          cp build/libs/snap-version-*-all.jar dist/
          cd dist
          sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
          body: |
            ## Install

            ### Recommended: clone + run via Gradle (works on macOS, Linux, Windows)

            ```bash
            git clone https://github.com/AndreKurait/snap-version
            cd snap-version
            ./gradlew installDist
            build/install/snap-version/bin/snap-version --help
            ```

            The Gradle wrapper auto-provisions Java 21 if needed (no admin
            rights required). No Gatekeeper / unsigned-binary issues.

            ### Or: download a prebuilt JVM distribution

            ```bash
            curl -L -o snap-version.tar https://github.com/AndreKurait/snap-version/releases/download/${{ steps.vars.outputs.tag }}/snap-version-${{ steps.vars.outputs.version }}.tar
            tar -xf snap-version.tar
            ./snap-version-${{ steps.vars.outputs.version }}/bin/snap-version --help
            ```

            Requires Java 21+ on `$PATH` (Temurin / Corretto / etc.).

            ### Or: single fat JAR

            ```bash
            curl -L -o snap-version.jar https://github.com/AndreKurait/snap-version/releases/download/${{ steps.vars.outputs.tag }}/snap-version-${{ steps.vars.outputs.version }}-all.jar
            java -jar snap-version.jar --help
            ```

            ### Verify checksums

            ```bash
            curl -L -O https://github.com/AndreKurait/snap-version/releases/download/${{ steps.vars.outputs.tag }}/SHA256SUMS.txt
            sha256sum -c SHA256SUMS.txt
            ```
