services:
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: smile-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    container_name: smile-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/snapshots || true) &&
      mc anonymous set download local/snapshots
      "

  # ============= SOURCE: OpenSearch 2.19.4 =============
  opensearch-source:
    image: opensearchproject/opensearch:2.19.4
    container_name: smile-os-source
    environment:
      - discovery.type=single-node
      - cluster.name=source-cluster
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "s3.client.default.endpoint=minio:9000"
      - "s3.client.default.protocol=http"
      - "s3.client.default.path_style_access=true"
      - "s3.client.default.region=us-east-1"
      - AWS_REGION=us-east-1
    ports:
      - "9200:9200"  # source on 9200
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    entrypoint: ["/init/opensearch-init.sh"]
    volumes:
      - ./opensearch-init.sh:/init/opensearch-init.sh:ro

  # ============= TARGET: OpenSearch 2.19.0 =============
  opensearch-target:
    image: opensearchproject/opensearch:2.19.0
    container_name: smile-os-target
    environment:
      - discovery.type=single-node
      - cluster.name=target-cluster
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "s3.client.default.endpoint=minio:9000"
      - "s3.client.default.protocol=http"
      - "s3.client.default.path_style_access=true"
      - "s3.client.default.region=us-east-1"
      - AWS_REGION=us-east-1
    ports:
      - "9201:9200"  # target on 9201
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    entrypoint: ["/init/opensearch-init.sh"]
    volumes:
      - ./opensearch-init.sh:/init/opensearch-init.sh:ro
